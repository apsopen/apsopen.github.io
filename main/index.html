<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>APS Open</title>

    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="main-container">

    <div class="main-card">

        <h1 id="site-name">
            APS Open
        </h1>


        <p>
            Welcome to APS Open.
        </p>


        <p class="description">
            If you have not set up your client yet,
            go to the setup page first.
            If you have already completed setup,
            continue by logging in.
        </p>


        <div class="buttons">

            <button onclick="window.location.href='/setup'">
                Setup
            </button>


            <button onclick="window.location.href='/login'">
                Login
            </button>

        </div>

    </div>

</div>


<script src="script.js"></script>

</body>

</html>
