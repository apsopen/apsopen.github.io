<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>APS Open</title>

    <style>

        body {

            margin:0;

            background:linear-gradient(135deg,#0f172a,#1e293b);

            color:white;

            font-family:Inter,Arial,sans-serif;

        }


        .main-container {

            width:100%;
            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

        }


        .main-card {

            width:min(500px,90%);

            background:rgba(255,255,255,.06);

            border:1px solid rgba(255,255,255,.15);

            border-radius:20px;

            padding:45px;

            text-align:center;

        }


        #site-name {

            font-size:48px;

            font-weight:800;

            margin:0 0 25px;

        }


        .main-card p {

            font-size:18px;

        }


        .description {

            color:#cbd5e1;

            line-height:1.5;

        }


        button {

            margin-top:25px;

            background:#2563eb;

            color:white;

            border:none;

            border-radius:12px;

            padding:13px 35px;

            cursor:pointer;

            font-size:16px;

        }


        button:hover {

            background:#1d4ed8;

        }

    </style>

</head>


<body>

<div class="main-container">

    <div class="main-card">

        <h1 id="site-name">
            APS Open
        </h1>


        <p>
            Redirecting you to the main site...
        </p>


        <p class="description">
            If you are not redirected automatically,
            click the button below.
        </p>


        <button onclick="goToMain()">
            Continue
        </button>

    </div>

</div>


<script>

async function getVersion() {

    const response = await fetch("/version.txt");


    if (!response.ok) {
        return;
    }


    const contents = await response.text();


    document.getElementById("site-name").textContent =
        contents;

}



function goToMain() {

    window.location.href = "/main";

}



setTimeout(() => {

    window.location.href = "/main";

}, 1);



getVersion();

</script>


</body>

</html>
